<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Exercícios - Aula 7 | Conjuntos Numéricos</title>
    <style>
        /* =========================================================
           RESET E VARIÁVEIS
           ========================================================= */
        :root {
            --primary: #2c3e50;
            --primary-hover: #1a252f;
            --secondary: #3498db;
            --success: #2ecc71;
            --success-dark: #27ae60;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-light: #6c757d;
            --border-color: #e9ecef;
            --font-main: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --shadow: 0 8px 16px rgba(0,0,0,0.08);
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        /* =========================================================
           ANIMAÇÕES
           ========================================================= */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .slide-in { animation: slideInRight 0.4s ease forwards; }

        /* =========================================================
           ESTRUTURA PRINCIPAL
           ========================================================= */
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; flex: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 1.5rem; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 0.5rem; }
        h2 { color: var(--text-light); font-size: 1.2rem; font-weight: 500; }
        h3 { color: var(--secondary); margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }

        /* =========================================================
           BOTÕES E CONTROLES
           ========================================================= */
        .btn { background: var(--secondary); color: white; border: none; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: 600; border-radius: var(--radius); cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn:hover { background: #2980b9; transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .btn-outline { background: transparent; color: var(--secondary); border: 2px solid var(--secondary); }
        .btn-outline:hover { background: var(--secondary); color: white; }
        .btn-large { padding: 1rem 3rem; font-size: 1.2rem; border-radius: 50px; width: 100%; max-width: 400px; }
        
        /* =========================================================
           INTERFACE DO QUIZ E DASHBOARD
           ========================================================= */
        .progress-container { margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; font-weight: 600; color: var(--text-light); margin-bottom: 0.5rem;}
        .progress-bar-bg { background: var(--border-color); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: var(--secondary); height: 100%; width: 0%; transition: width 0.4s ease; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
        .question-figure { text-align: center; margin-bottom: 1.5rem; }
        .question-figure svg { max-width: 100%; height: auto; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { background: var(--bg-color); border: 2px solid var(--border-color); border-radius: var(--radius); padding: 1rem; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 15px; }
        .option-btn:hover { border-color: var(--secondary); background: rgba(52, 152, 219, 0.05); }
        .option-btn.selected { border-color: var(--secondary); background: rgba(52, 152, 219, 0.1); font-weight: 600; }
        .option-letter { background: white; border-radius: 50%; min-width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border-color); }
        .navigation-buttons { display: flex; justify-content: space-between; margin-top: 2rem; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .summary-card { text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .summary-card h3 { color: white; border-bottom-color: rgba(255,255,255,0.2); }
        .score-huge { font-size: 3rem; font-weight: 700; margin: 1rem 0; }
        .medal-icon { font-size: 4rem; margin-bottom: 1rem; }

        .chart-container { display: flex; justify-content: center; align-items: center; flex-direction: column; height: 100%; }
        .donut-chart { width: 150px; height: 150px; border-radius: 50%; background: conic-gradient(var(--success-dark) var(--chart-deg, 0deg), var(--danger) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .donut-inner { width: 110px; height: 110px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
        .chart-legend { display: flex; gap: 1rem; margin-top: 1rem; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.95rem; }
        .data-table th, .data-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { background: var(--bg-color); font-weight: 600; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
        .status-good { background: rgba(39, 174, 96, 0.2); color: var(--success-dark); }
        .status-bad { background: rgba(231, 76, 60, 0.2); color: var(--danger); }
        .status-warn { background: rgba(241, 196, 15, 0.2); color: #d35400; }

        .bloom-bar-container { margin-bottom: 1rem; }
        .bloom-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.9rem; font-weight: 600; }
        
        .study-plan-list { list-style: none; }
        .study-plan-list li { padding: 10px; border-left: 4px solid var(--warning); background: var(--bg-color); margin-bottom: 8px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.95rem; }

        .review-item { border: 1px solid var(--border-color); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
        .review-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;}
        .review-correct { background: rgba(39, 174, 96, 0.05); border-color: var(--success-dark); }
        .review-incorrect { background: rgba(231, 76, 60, 0.05); border-color: var(--danger); }
        .explanation { background: white; padding: 12px; margin-top: 15px; border-radius: 8px; font-size: 0.95rem; border-left: 4px solid var(--secondary); box-shadow: var(--shadow-sm); }

        .action-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }

        @media print {
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; margin-bottom: 1rem; break-inside: avoid; }
            .action-buttons, .progress-container { display: none; }
            .summary-card { background: none; color: black; border: 2px solid black; }
            .summary-card h3 { color: black; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- As telas são renderizadas aqui -->
</div>

<script>
    /* =========================================================
       BASE DE DADOS: QUESTÕES
       ========================================================= */
    const questions = [
        {
            id: 1, skill: "Relações de Pertinência", taxonomy: "Lembrar",
            text: "Na teoria dos conjuntos numéricos, utilizamos símbolos específicos para relacionar elementos com conjuntos. Qual símbolo abaixo indica que um elemento PERTENCE a um conjunto?",
            figure: null,
            options: [
                "⊂ (Está contido)",
                "∈ (Pertence)",
                "⊃ (Contém)",
                "∉ (Não pertence)"
            ],
            correct: 1,
            explanation: "O símbolo ∈ significa 'pertence' e é usado exclusivamente para relacionar um ELEMENTO a um CONJUNTO. Exemplo: 10 ∈ N (O número 10 pertence ao conjunto dos Naturais)."
        },
        {
            id: 2, skill: "Relações de Inclusão", taxonomy: "Compreender",
            text: "Os números Naturais (N) são formados pelos números inteiros positivos e o zero. Já os números Racionais (Q) englobam todos os números que podem ser escritos em forma de fração. Qual alternativa representa corretamente a relação entre N e Q?",
            figure: null,
            options: [
                "N ⊄ Q (Naturais não estão contidos em Racionais)",
                "N ⊂ Q (Naturais estão contidos em Racionais)",
                "Q ⊂ N (Racionais estão contidos em Naturais)",
                "N ∈ Q (O conjunto N pertence ao conjunto Q)"
            ],
            correct: 1,
            explanation: "Todo número natural pode ser escrito como fração (ex: 7 = 7/1). Portanto, o conjunto inteiro de N está 'dentro' de Q. Usamos o símbolo de inclusão (⊂) para relacionar conjunto com conjunto."
        },
        {
            id: 3, skill: "Classificação de Conjuntos", taxonomy: "Compreender",
            text: "Observe a representação gráfica dos Conjuntos Numéricos abaixo. Qual afirmação é verdadeira sobre o conjunto dos números Reais (R)?",
            figure: `
                <svg viewBox="0 0 320 160" width="100%" max-width="320" height="160">
                    <rect x="10" y="10" width="300" height="140" fill="none" stroke="#2c3e50" stroke-width="2" rx="10"/>
                    <text x="20" y="30" font-weight="bold" fill="#2c3e50">R (Reais)</text>
                    
                    <ellipse cx="110" cy="85" rx="80" ry="55" fill="rgba(52, 152, 219, 0.1)" stroke="#3498db" stroke-width="2"/>
                    <text x="35" y="60" font-weight="bold" fill="#2980b9">Q</text>
                    
                    <circle cx="120" cy="85" r="40" fill="rgba(52, 152, 219, 0.2)" stroke="#2980b9" stroke-width="1.5"/>
                    <text x="95" y="70" font-weight="bold" fill="#2c3e50">Z</text>
                    
                    <circle cx="135" cy="95" r="20" fill="rgba(52, 152, 219, 0.3)"/>
                    <text x="130" y="100" font-weight="bold" fill="#2c3e50">N</text>
                    
                    <ellipse cx="250" cy="85" rx="45" ry="55" fill="rgba(231, 76, 60, 0.1)" stroke="#e74c3c" stroke-width="2"/>
                    <text x="245" y="90" font-weight="bold" fill="#c0392b">I</text>
                </svg>
            `,
            options: [
                "R contém apenas os números racionais (Q).",
                "R contém os racionais (Q) e os irracionais (I).",
                "R é um subconjunto isolado de Z.",
                "I é um subconjunto de Q."
            ],
            correct: 1,
            explanation: "O conjunto dos Reais (R) é a união dos Racionais (Q) com os Irracionais (I). Como mostra o diagrama, Q e I são conjuntos separados (disjuntos), mas ambos formam o grande retângulo de R."
        },
        {
            id: 4, skill: "Classificação de Conjuntos", taxonomy: "Analisar",
            text: "O número 0,5 pode ser escrito na forma de fração como 1/2. De acordo com a teoria dos conjuntos, isso significa que o número 0,5 é:",
            figure: null,
            options: [
                "Inteiro e Racional.",
                "Natural e Irracional.",
                "Racional e Real.",
                "Inteiro e Irracional."
            ],
            correct: 2,
            explanation: "Todo número que pode ser escrito como fração é Racional (Q). E, como vimos, todos os racionais estão dentro do conjunto dos Reais (R). Ele não é inteiro pois possui parte decimal."
        },
        {
            id: 5, skill: "Relações de Pertinência", taxonomy: "Compreender",
            text: "A afirmação matemática “−3 ∉ N” deve ser lida e compreendida da seguinte forma:",
            figure: null,
            options: [
                "O número −3 é natural.",
                "O número −3 não é um número natural.",
                "O conjunto N não existe.",
                "O número −3 é irracional."
            ],
            correct: 1,
            explanation: "O símbolo ∉ significa 'não pertence'. O conjunto dos Naturais (N) engloba apenas o zero e os inteiros positivos (0, 1, 2, 3...). Logo, um número negativo não pertence a N."
        },
        {
            id: 6, skill: "Classificação de Conjuntos", taxonomy: "Aplicar",
            text: "Dentre as opções abaixo, qual representa um número IRRACIONAL (I)?",
            figure: null,
            options: [
                "0,25 (Decimal exato)",
                "−7 (Número negativo)",
                "√2 (Raiz não exata)",
                "3/5 (Fração)"
            ],
            correct: 2,
            explanation: "Números irracionais são dízimas infinitas não periódicas, ou seja, números que não podem ser transformados em fração. Raízes não exatas (como √2, √3) e o Pi (π) são os clássicos exemplos."
        },
        {
            id: 7, skill: "Relações de Pertinência", taxonomy: "Aplicar",
            text: "Assinale a alternativa que traz a relação de PERTINÊNCIA (Elemento x Conjunto) correta:",
            figure: null,
            options: [
                "10 ∉ N",
                "π ∈ R",
                "2,75 ∈ Z",
                "-1 ∈ N"
            ],
            correct: 1,
            explanation: "π (Pi) é irracional, mas como todos os irracionais são Reais (R), π ∈ R está correto. As outras estão erradas: 10 pertence a N, 2,75 não é inteiro (Z) e números negativos não são naturais (N)."
        },
        {
            id: 8, skill: "Relações de Inclusão", taxonomy: "Analisar",
            text: "Assinale a alternativa que demonstra a relação de INCLUSÃO (Conjunto x Conjunto) verdadeira:",
            figure: null,
            options: [
                "N ⊄ Q",
                "R ⊂ Z",
                "Z ⊂ Q",
                "I ⊂ Q"
            ],
            correct: 2,
            explanation: "A alternativa Z ⊂ Q está correta pois todo número Inteiro (Z) pode ser escrito como fração, logo os Inteiros 'estão contidos' nos Racionais (Q)."
        },
        {
            id: 9, skill: "Classificação de Conjuntos", taxonomy: "Aplicar",
            text: "Ao classificar o número −3 nos conjuntos numéricos, qual é a alternativa completamente correta?",
            figure: null,
            options: [
                "−3 ∈ N, −3 ∈ Z, −3 ∉ Q",
                "−3 ∉ N, −3 ∈ Z, −3 ∈ Q, −3 ∈ R",
                "−3 ∈ Z, mas −3 ∉ R",
                "−3 é um número irracional (I)."
            ],
            correct: 1,
            explanation: "O número -3 é negativo (não pertence a N, mas pertence a Z). Todo Z pertence a Q. Todo Q pertence a R. Logo: -3 ∉ N, -3 ∈ Z, -3 ∈ Q, -3 ∈ R."
        },
        {
            id: 10, skill: "Classificação de Conjuntos", taxonomy: "Analisar",
            text: "A frase 'todo número racional é real, mas nem todo real é racional' é verdadeira. Qual das opções abaixo justifica essa afirmação?",
            figure: null,
            options: [
                "Porque o conjunto dos Reais (R) também contém o conjunto dos Irracionais (I), como √2 ou π.",
                "Porque os números reais excluem as frações.",
                "Porque não existem números inteiros nos Reais.",
                "Porque a frase está incorreta, todo real é sempre racional."
            ],
            correct: 0,
            explanation: "Os Reais são como uma 'caixa grande' que junta duas caixas menores: os Racionais (Q) e os Irracionais (I). Se eu pego o √2, ele é Real, mas não é racional."
        },
        {
            id: 11, skill: "Classificação de Conjuntos", taxonomy: "Aplicar",
            text: "Avalie a raiz quadrada a seguir: O número √25 pertence primeiramente a qual conjunto?",
            figure: null,
            options: [
                "Aos Irracionais (I), pois é uma raiz.",
                "Aos Naturais (N), pois √25 = 5.",
                "Apenas aos Reais (R), mas não é inteiro.",
                "É uma dízima periódica."
            ],
            correct: 1,
            explanation: "Cuidado com a pegadinha! Embora tenha o símbolo de raiz, √25 tem resultado exato (5). O número 5 é natural, logo √25 ∈ N."
        },
        {
            id: 12, skill: "Relações de Inclusão", taxonomy: "Analisar e Interpretar",
            text: "Um aluno escreveu em sua prova que 'I ⊂ Q' (Os Irracionais estão contidos nos Racionais). Como devemos corrigir essa frase?",
            figure: null,
            options: [
                "A frase está correta, não precisa de correção.",
                "Os irracionais estão contidos apenas nos inteiros (I ⊂ Z).",
                "Os racionais estão contidos nos irracionais (Q ⊂ I).",
                "Devemos usar 'I ⊄ Q', pois Racionais e Irracionais são conjuntos disjuntos (não se misturam)."
            ],
            correct: 3,
            explanation: "Como vimos no diagrama de Venn, a elipse do Q e a elipse do I estão separadas. Um número nunca pode ser racional e irracional ao mesmo tempo. Portanto, I ⊄ Q (não está contido)."
        }
    ];

    /* =========================================================
       ESTADO DA APLICAÇÃO
       ========================================================= */
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let startTime = null;
    let endTime = null;

    const app = document.getElementById('app');

    function renderLandingPage() {
        app.innerHTML = `
            <div class="card fade-in" style="text-align: center; padding: 3rem 2rem;">
                <h1>Lista de Exercícios – Aula 7</h1>
                <h2>Conjuntos Numéricos e Inclusão (9º ano) - Prof. Maicon</h2>
                
                <div class="card" style="background: var(--bg-color); text-align: left; max-width: 600px; margin: 2rem auto;">
                    <h3 style="border:none; margin-bottom: 10px; color: var(--text-main); font-size: 1.1rem;">Instruções:</h3>
                    <ul style="color: var(--text-light); padding-left: 20px;">
                        <li>Responda as 12 questões com base no que estudamos em sala.</li>
                        <li>Esta é uma atividade de treino, aproveite para testar seus conhecimentos!</li>
                        <li>Ao final, você receberá a correção imediata e um relatório dos seus estudos.</li>
                    </ul>
                </div>

                <button class="btn btn-large" onclick="startQuiz()">INICIAR EXERCÍCIOS</button>
            </div>
        `;
    }

    function startQuiz() {
        startTime = Date.now();
        currentQuestionIndex = 0;
        userAnswers.fill(null);
        renderQuestion();
    }

    function selectOption(index) {
        userAnswers[currentQuestionIndex] = index;
        renderQuestion(); 
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        const progress = ((currentQuestionIndex) / questions.length) * 100;
        const letters = ['A', 'B', 'C', 'D'];

        let optionsHTML = '';
        q.options.forEach((opt, idx) => {
            const isSelected = userAnswers[currentQuestionIndex] === idx ? 'selected' : '';
            optionsHTML += `
                <div class="option-btn ${isSelected}" onclick="selectOption(${idx})">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt}</span>
                </div>
            `;
        });

        app.innerHTML = `
            <div class="card slide-in">
                <div class="progress-container">
                    <div class="progress-header">
                        <span>Questão ${currentQuestionIndex + 1} de ${questions.length}</span>
                        <span>${Math.round(progress)}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                </div>

                <div class="question-text">${q.text}</div>
                ${q.figure ? `<div class="question-figure">${q.figure}</div>` : ''}
                
                <div class="options-grid">
                    ${optionsHTML}
                </div>

                <div class="navigation-buttons">
                    <button class="btn btn-outline" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'style="visibility:hidden;"' : ''}>Anterior</button>
                    ${currentQuestionIndex === questions.length - 1 
                        ? `<button class="btn" onclick="finishQuiz()" ${userAnswers[currentQuestionIndex] === null ? 'disabled style="opacity:0.5"' : ''}>Finalizar e Corrigir</button>`
                        : `<button class="btn" onclick="nextQuestion()" ${userAnswers[currentQuestionIndex] === null ? 'disabled style="opacity:0.5"' : ''}>Próxima</button>`
                    }
                </div>
            </div>
        `;
    }

    function nextQuestion() { if (currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; renderQuestion(); } }
    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuestion(); } }

    /* =========================================================
       CORREÇÃO IMEDIATA (Sem envio de dados)
       ========================================================= */
    function finishQuiz() {
        endTime = Date.now();
        
        let acertos = 0;
        userAnswers.forEach((ans, idx) => { if (ans === questions[idx].correct) acertos++; });
        const perc = Math.round((acertos / questions.length) * 100);
        const timeSpent = Math.max(1, Math.round((endTime - startTime) / 60000)); 
        
        const hab1Indices = [2, 3, 5, 8, 9, 10]; // Classificação de Conjuntos
        const hab2Indices = [0, 1, 4, 6, 7, 11]; // Símbolos e Relações

        let hab1Acertos = 0; 
        let hab2Acertos = 0; 
        
        hab1Indices.forEach(i => { if(userAnswers[i] === questions[i].correct) hab1Acertos++; });
        hab2Indices.forEach(i => { if(userAnswers[i] === questions[i].correct) hab2Acertos++; });

        // Chama o dashboard diretamente sem passar pela validação de rede
        renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos);
    }

    function renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos) {
        const erros = questions.length - acertos;
        
        let medal = "Precisa Revisar os Conjuntos"; let icon = "📚"; let color = "var(--danger)";
        if(perc >= 90) { medal = "Ouro (Domínio Total)"; icon = "🏆"; color = "#f1c40f"; }
        else if(perc >= 70) { medal = "Prata (Ótimo Desempenho)"; icon = "🥈"; color = "#95a5a6"; }
        else if(perc >= 50) { medal = "Bronze (Conceitos Básicos)"; icon = "🥉"; color = "#d35400"; }

        const classificarHabilidade = (acertosHab) => {
            if(acertosHab >= 5) return `<span class="status-badge status-good">Avançado</span>`;
            if(acertosHab >= 3) return `<span class="status-badge status-warn">Em Desenvolvimento</span>`;
            return `<span class="status-badge status-bad">Requer Atenção</span>`;
        };

        let dicasSet = new Set();
        userAnswers.forEach((ans, i) => {
            if(ans !== questions[i].correct) {
                if([0, 1, 4, 6, 7, 11].includes(i)) dicasSet.add("Revise o uso dos símbolos: ∈ e ∉ ligam ELEMENTO a CONJUNTO. ⊂ e ⊄ ligam CONJUNTO a CONJUNTO.");
                if([2, 3, 5, 8, 9].includes(i)) dicasSet.add("Atenção às definições: N (Positivos e 0), Z (Positivos, 0 e Negativos), Q (Frações e Decimais) e I (Raízes não exatas). R é a junção de tudo!");
                if([10].includes(i)) dicasSet.add("Lembre-se: Nem toda raiz é irracional. Resolva a raiz (ex: √25 = 5) antes de classificar o número.");
            }
        });
        let dicasHTML = '';
        if(dicasSet.size === 0) dicasHTML = "<li>Parabéns! Você tem um excelente domínio sobre o funcionamento e classificação dos conjuntos numéricos.</li>";
        else dicasSet.forEach(dica => dicasHTML += `<li>${dica}</li>`);

        let reviewHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            const statusClass = isCorrect ? 'review-correct' : 'review-incorrect';
            const statusIcon = isCorrect ? '✅ Acertou' : '❌ Errou';
            
            reviewHTML += `
                <div class="review-item ${statusClass}">
                    <div class="review-header">
                        <span>Questão ${i+1}</span>
                        <span>${statusIcon}</span>
                    </div>
                    <p style="margin-bottom: 10px; font-weight: 500;">${q.text}</p>
                    <p><strong>Sua resposta:</strong> ${letters[userAnswers[i]]} - ${q.options[userAnswers[i]]}</p>
                    ${!isCorrect ? `<p><strong>Resposta Correta:</strong> ${letters[q.correct]} - ${q.options[q.correct]}</p>` : ''}
                    <div class="explanation"><strong>Comentário do Professor:</strong> ${q.explanation}</div>
                </div>
            `;
        });

        const deg = (acertos / questions.length) * 360;

        app.innerHTML = `
            <div class="fade-in">
                <header>
                    <h1>Relatório de Desempenho</h1>
                    <h2>Lista de Exercícios: Conjuntos Numéricos</h2>
                </header>

                <div class="dashboard-grid">
                    <div class="card summary-card">
                        <h3>Desempenho Geral</h3>
                        <div class="medal-icon">${icon}</div>
                        <div style="font-size: 1.2rem; font-weight: bold; color: ${color}; margin-bottom: 10px;">${medal}</div>
                        <div class="score-huge">${acertos} <span style="font-size: 1.5rem; font-weight: normal">/ 12</span></div>
                        <div style="font-size: 1.2rem;">${perc}% de Aproveitamento</div>
                        <div style="margin-top: 10px; opacity: 0.8;">Tempo: ~${timeSpent} min</div>
                    </div>

                    <div class="card chart-container">
                        <h3>Gráfico de Acertos</h3>
                        <div class="donut-chart" style="--chart-deg: ${deg}deg;">
                            <div class="donut-inner">${perc}%</div>
                        </div>
                        <div class="chart-legend">
                            <div class="legend-item"><div class="legend-color" style="background:var(--success-dark)"></div> ${acertos} Corretas</div>
                            <div class="legend-item"><div class="legend-color" style="background:var(--danger)"></div> ${erros} Incorretas</div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Mapeamento de Habilidades</h3>
                        <table class="data-table">
                            <tr>
                                <td><strong>Compreensão dos Conjuntos</strong><br><small>Identificar as características de N, Z, Q, I e R</small></td>
                                <td>${classificarHabilidade(hab1Acertos)}</td>
                            </tr>
                            <tr>
                                <td><strong>Lógica e Símbolos (∈ e ⊂)</strong><br><small>Aplicar pertinência e inclusão corretamente</small></td>
                                <td>${classificarHabilidade(hab2Acertos)}</td>
                            </tr>
                        </table>
                    </div>

                    <div class="card">
                        <h3>Plano de Estudo Direcionado</h3>
                        <ul class="study-plan-list">
                            ${dicasHTML}
                        </ul>
                    </div>
                </div>

                <div class="card">
                    <h3>Gabarito Comentado</h3>
                    <div style="margin-top: 1.5rem;">
                        ${reviewHTML}
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-outline" onclick="startQuiz()">
                        Refazer Exercícios
                    </button>
                    <button class="btn" onclick="window.print()">
                        Imprimir / Salvar PDF
                    </button>
                </div>
            </div>
        `;
    }

    renderLandingPage();

</script>
</body>
</html>
