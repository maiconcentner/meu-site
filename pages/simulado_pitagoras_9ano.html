<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisão - Simulado de Matemática</title>
    <style>
        /* =========================================================
           RESET E VARIÁVEIS
           ========================================================= */
        :root {
            --primary: #4361ee;
            --primary-hover: #3a53d0;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --success-dark: #20b2aa;
            --danger: #f72585;
            --warning: #f8961e;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-light: #6c757d;
            --border-color: #e9ecef;
            --font-main: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --shadow: 0 8px 16px rgba(0,0,0,0.08);
            --shadow-sm: 0 4px 6px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        /* =========================================================
           ANIMAÇÕES
           ========================================================= */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .slide-in { animation: slideInRight 0.4s ease forwards; }

        /* =========================================================
           ESTRUTURA PRINCIPAL E FORMULÁRIO
           ========================================================= */
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; flex: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 1.5rem; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--secondary); font-size: 2.2rem; margin-bottom: 0.5rem; }
        h2 { color: var(--text-light); font-size: 1.2rem; font-weight: 500; }
        h3 { color: var(--primary); margin-bottom: 1rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }

        .input-group { text-align: left; max-width: 400px; margin: 0 auto 2rem; background: var(--bg-color); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border-color); }
        .input-label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main); }
        .input-field { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2); }

        /* =========================================================
           BOTÕES E CONTROLES
           ========================================================= */
        .btn { background: var(--primary); color: white; border: none; padding: 0.8rem 1.5rem; font-size: 1rem; font-weight: 600; border-radius: var(--radius); cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-large { padding: 1rem 3rem; font-size: 1.2rem; border-radius: 50px; width: 100%; max-width: 400px; }
        
        /* =========================================================
           INTERFACE DO QUIZ E DASHBOARD
           ========================================================= */
        .progress-container { margin-bottom: 1.5rem; }
        .progress-header { display: flex; justify-content: space-between; font-weight: 600; color: var(--text-light); margin-bottom: 0.5rem;}
        .progress-bar-bg { background: var(--border-color); height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.4s ease; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
        .question-figure { text-align: center; margin-bottom: 1.5rem; }
        .question-figure svg { max-width: 100%; height: auto; }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { background: var(--bg-color); border: 2px solid var(--border-color); border-radius: var(--radius); padding: 1rem; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 15px; }
        .option-btn:hover { border-color: var(--primary); background: rgba(67,97,238,0.05); }
        .option-btn.selected { border-color: var(--primary); background: rgba(67,97,238,0.1); font-weight: 600; }
        .option-letter { background: white; border-radius: 50%; min-width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid var(--border-color); }
        .navigation-buttons { display: flex; justify-content: space-between; margin-top: 2rem; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .summary-card { text-align: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .summary-card h3 { color: white; border-bottom-color: rgba(255,255,255,0.2); }
        .score-huge { font-size: 3rem; font-weight: 700; margin: 1rem 0; }
        .medal-icon { font-size: 4rem; margin-bottom: 1rem; }

        .chart-container { display: flex; justify-content: center; align-items: center; flex-direction: column; height: 100%; }
        .donut-chart { width: 150px; height: 150px; border-radius: 50%; background: conic-gradient(var(--success-dark) var(--chart-deg, 0deg), var(--danger) 0deg); display: flex; align-items: center; justify-content: center; position: relative; }
        .donut-inner { width: 110px; height: 110px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: var(--text-main); }
        .chart-legend { display: flex; gap: 1rem; margin-top: 1rem; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.95rem; }
        .data-table th, .data-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .data-table th { background: var(--bg-color); font-weight: 600; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; white-space: nowrap; }
        .status-good { background: rgba(32, 178, 170, 0.2); color: var(--success-dark); }
        .status-bad { background: rgba(247, 37, 133, 0.2); color: var(--danger); }
        .status-warn { background: rgba(248, 150, 30, 0.2); color: var(--warning); }

        .bloom-bar-container { margin-bottom: 1rem; }
        .bloom-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.9rem; font-weight: 600; }
        
        .study-plan-list { list-style: none; }
        .study-plan-list li { padding: 10px; border-left: 4px solid var(--warning); background: var(--bg-color); margin-bottom: 8px; border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.95rem; }

        .review-item { border: 1px solid var(--border-color); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
        .review-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;}
        .review-correct { background: rgba(32, 178, 170, 0.05); border-color: var(--success-dark); }
        .review-incorrect { background: rgba(247, 37, 133, 0.05); border-color: var(--danger); }
        .explanation { background: white; padding: 12px; margin-top: 15px; border-radius: 8px; font-size: 0.95rem; border-left: 4px solid var(--primary); box-shadow: var(--shadow-sm); }

        .action-buttons { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
        .save-notice { text-align: center; color: var(--success-dark); font-weight: 600; margin-bottom: 1rem; padding: 10px; background: rgba(32,178,170,0.1); border-radius: var(--radius); }

        @media print {
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; margin-bottom: 1rem; break-inside: avoid; }
            .action-buttons, .progress-container, .save-notice { display: none; }
            .summary-card { background: none; color: black; border: 2px solid black; }
            .summary-card h3 { color: black; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    </div>

<script>
    /* =========================================================
       CONFIGURAÇÕES DE INTEGRAÇÃO (COLE SUA URL AQUI)
       ========================================================= */
    const URL_DA_PLANILHA = "https://script.google.com/macros/s/AKfycbxn1qkFfr1zzP5BSQLqDz7a7ifJN7_pkrczFTHJyXhJNCDPwYZ_L_y1kZUxudWfuqYB3A/exec";

    /* =========================================================
       BASE DE DADOS: QUESTÕES
       ========================================================= */
    const questions = [
        {
            id: 1, skill: "EF.09.MAT.3.100", taxonomy: "Lembrar",
            text: "Sobre as propriedades de um triângulo retângulo, é correto afirmar que a hipotenusa:",
            figure: `
                <svg viewBox="0 0 200 150" width="200" height="150">
                    <polygon points="20,130 150,130 150,40" fill="none" stroke="#2b2d42" stroke-width="2"/>
                    <rect x="135" y="115" width="15" height="15" fill="none" stroke="#2b2d42"/>
                    <text x="65" y="75" font-family="sans-serif" font-size="14" transform="rotate(-34, 65, 75)">hipotenusa</text>
                    <text x="70" y="145" font-family="sans-serif" font-size="14">cateto</text>
                    <text x="160" y="90" font-family="sans-serif" font-size="14" transform="rotate(90, 160, 90)">cateto</text>
                </svg>
            `,
            options: [
                "É sempre o menor lado e fica oposta ao ângulo de 90°.",
                "Pode ser igual a um dos catetos, dependendo do triângulo.",
                "É sempre o maior lado e encontra-se posicionada de forma oposta ao ângulo reto.",
                "É o lado que ajuda a formar o ângulo reto (90°) junto com a base."
            ],
            correct: 2,
            explanation: "Para não cair em pegadinhas: lembre-se sempre de que a hipotenusa é o MAIOR lado de um triângulo retângulo e está sempre de frente (oposta) para o ângulo de 90°."
        },
        {
            id: 2, skill: "EF.09.MAT.3.100", taxonomy: "Compreender",
            text: "O Teorema de Pitágoras, expresso matematicamente pela fórmula c² = a² + b², pode ser aplicado para calcular lados de:",
            figure: null,
            options: [
                "Qualquer tipo de triângulo, seja ele acutângulo, obtusângulo ou retângulo.",
                "Exclusivamente triângulos retângulos.",
                "Apenas triângulos que possuem todos os lados iguais (equiláteros).",
                "Apenas triângulos obtusângulos."
            ],
            correct: 1,
            explanation: "Pitágoras é exclusivo para triângulos que possuem um ângulo reto (triângulos retângulos). Não tente aplicar a fórmula em outros tipos!"
        },
        {
            id: 3, skill: "EF.09.MAT.3.100", taxonomy: "Aplicar",
            text: "Um aluno afirmou: 'Se os catetos de um triângulo retângulo medem 6 cm e 8 cm, a sua hipotenusa medirá exatamente 14 cm, pois basta somar os dois lados.' Esta afirmação está incorreta. Qual é a medida real da hipotenusa?",
            figure: null,
            options: [
                "10 cm, pois a² = 6² + 8².",
                "14 cm, pois a = 6 + 8.",
                "2 cm, pois a = 8 - 6.",
                "100 cm, pois a = 6² + 8²."
            ],
            correct: 0,
            explanation: "Nunca some os lados diretamente. É preciso usar Pitágoras: a² = 6² + 8² ➝ a² = 36 + 64 ➝ a² = 100 ➝ a = √100 = 10 cm."
        },
        {
            id: 4, skill: "EF.09.MAT.3.100", taxonomy: "Analisar",
            text: "Geometricamente, o que a relação do Teorema de Pitágoras nos afirma sobre as áreas desenhadas sobre os lados do triângulo retângulo?",
            figure: null,
            options: [
                "A área do quadrado construído sobre a hipotenusa é o dobro da área dos catetos.",
                "A soma das áreas dos quadrados construídos sobre as medidas dos catetos é igual à área do quadrado construído sobre a hipotenusa.",
                "A área do triângulo é igual à soma das áreas dos quadrados dos catetos.",
                "As áreas de todos os quadrados construídos sobre os lados do triângulo são iguais."
            ],
            correct: 1,
            explanation: "Essa é a definição clássica cobrada na teoria: desenhar um quadrado em cada cateto e somar suas áreas dará exatamente a mesma área do quadrado desenhado sobre a hipotenusa."
        },
        {
            id: 5, skill: "EF.09.MAT.3.100", taxonomy: "Compreender",
            text: "Um terreno tem o formato de um retângulo de 9 m de largura por 12 m de comprimento. Ao passar um cabo de aço na diagonal desse terreno, que modelo matemático se forma?",
            figure: `
                <svg viewBox="0 0 200 130" width="200" height="130">
                    <rect x="20" y="20" width="160" height="90" fill="none" stroke="#2b2d42" stroke-width="2"/>
                    <rect x="165" y="95" width="15" height="15" fill="none" stroke="#2b2d42"/>
                    <line x1="20" y1="110" x2="180" y2="20" stroke="#2b2d42" stroke-width="2" stroke-dasharray="6,4"/>
                    <text x="95" y="60" font-family="sans-serif" font-size="16" font-style="italic">x</text>
                    <text x="90" y="125" font-family="sans-serif" font-size="14">12 m</text>
                    <text x="185" y="70" font-family="sans-serif" font-size="14">9 m</text>
                </svg>
            `,
            options: [
                "Um triângulo retângulo, onde a diagonal é um cateto e os lados 9 m e 12 m são a hipotenusa.",
                "Um triângulo retângulo, onde a diagonal 'x' representa a hipotenusa e os lados do terreno são os catetos.",
                "Um triângulo equilátero de lados iguais a 'x'.",
                "Um quadrado perfeito cuja área é a soma de 9 e 12."
            ],
            correct: 1,
            explanation: "Ao dividir um retângulo ao meio por sua diagonal, criamos dois triângulos retângulos. Os lados do terreno formam o ângulo de 90° (são os catetos), e o cabo esticado (diagonal) é a hipotenusa."
        },
        {
            id: 6, skill: "EF.09.MAT.3.100", taxonomy: "Aplicar",
            text: "Resolvendo o problema do terreno (9 m por 12 m), qual será o comprimento exato do cabo de aço (diagonal x)?",
            figure: null,
            options: [
                "21 metros.",
                "15 metros.",
                "225 metros.",
                "10 metros."
            ],
            correct: 1,
            explanation: "Aplicando Pitágoras: x² = 9² + 12² ➝ x² = 81 + 144 ➝ x² = 225 ➝ x = √225 = 15 metros."
        },
        {
            id: 7, skill: "EF.09.MAT.2.96", taxonomy: "Lembrar",
            text: "Na trigonometria, como definimos a razão chamada Seno (sen) de um ângulo agudo?",
            figure: null,
            options: [
                "É a razão entre o cateto adjacente e a hipotenusa.",
                "É a razão entre a hipotenusa e o cateto oposto.",
                "É a razão entre o cateto oposto e a hipotenusa.",
                "É a razão exclusiva entre o cateto oposto e o cateto adjacente."
            ],
            correct: 2,
            explanation: "A verdadeira definição de Seno é a divisão do Cateto Oposto pela Hipotenusa."
        },
        {
            id: 8, skill: "EF.09.MAT.2.96", taxonomy: "Lembrar",
            text: "De acordo com as razões trigonométricas fundamentais, a Tangente (tan) de um ângulo é a razão exclusiva entre:",
            figure: null,
            options: [
                "Cateto Oposto e Cateto Adjacente (tan = CO / CA).",
                "Cateto Oposto e Hipotenusa (tan = CO / H).",
                "Cateto Adjacente e Hipotenusa (tan = CA / H).",
                "Cateto Adjacente e Cateto Oposto (tan = CA / CO)."
            ],
            correct: 0,
            explanation: "A tangente é a única razão trigonométrica que não utiliza a hipotenusa, dividindo diretamente o Cateto Oposto pelo Cateto Adjacente."
        },
        {
            id: 9, skill: "EF.09.MAT.2.96", taxonomy: "Analisar",
            text: "Observe a relação entre os ângulos α (alfa) e β (beta) de um mesmo triângulo retângulo. O cateto que atua como OPOSTO ao ângulo α será o que em relação ao ângulo β?",
            figure: `
                <svg viewBox="0 0 250 160" width="250" height="160">
                    <polygon points="20,140 120,140 20,20" fill="none" stroke="#2b2d42" stroke-width="2"/>
                    <rect x="20" y="125" width="15" height="15" fill="none" stroke="#2b2d42"/>
                    <path d="M 95 140 A 25 25 0 0 0 100 115" fill="none" stroke="#2b2d42" stroke-width="1.5"/>
                    <text x="80" y="130" font-family="serif" font-size="16" font-style="italic">α</text>
                    <path d="M 20 50 A 30 30 0 0 0 40 45" fill="none" stroke="#2b2d42" stroke-width="1.5"/>
                    <text x="25" y="70" font-family="serif" font-size="16" font-style="italic">β</text>
                </svg>
            `,
            options: [
                "Será a hipotenusa do triângulo.",
                "Será também o cateto oposto ao ângulo β.",
                "Será obrigatoriamente o cateto adjacente ao ângulo β.",
                "Será o ângulo reto de 90°."
            ],
            correct: 2,
            explanation: "A parede que está 'de frente' para o ângulo lá de baixo (α) é a mesma parede que forma (está 'ao lado') do ângulo lá de cima (β). Logo, o oposto de um é o adjacente do outro."
        },
        {
            id: 10, skill: "EF.09.MAT.2.96", taxonomy: "Compreender",
            text: "Se calcularmos o Seno do ângulo α e depois mudarmos nossa referência para calcular o Seno do ângulo β no mesmo triângulo, a medida da hipotenusa sofre alteração?",
            figure: null,
            options: [
                "Sim, a hipotenusa muda de posição dependendo do ângulo de referência.",
                "Sim, a hipotenusa passa a ser o cateto maior.",
                "Depende do tamanho do triângulo.",
                "Não, a hipotenusa é fixa e independe de qual ângulo agudo tomamos como referência."
            ],
            correct: 3,
            explanation: "Os catetos mudam de nome (oposto ou adjacente) dependendo de quem 'olha' para eles, mas a hipotenusa é estrutural, é sempre o maior lado e nunca muda de valor!"
        },
        {
            id: 11, skill: "EF.09.MAT.2.96", taxonomy: "Aplicar",
            text: "Considere o triângulo retângulo abaixo, onde os catetos medem 8 cm e 15 cm, a hipotenusa mede 17 cm, e θ é o ângulo de frente para o de 8 cm. Qual é o valor do Seno (sen θ)?",
            figure: `
                <svg viewBox="0 0 250 140" width="250" height="140">
                    <polygon points="40,120 220,120 40,20" fill="none" stroke="#2b2d42" stroke-width="2"/>

                    <path d="M 180 120 A 40 40 0 0 0 195 105" fill="none" stroke="#2b2d42" stroke-width="1.5"/>
                    <text x="170" y="115" font-family="serif" font-size="16" font-style="italic">θ</text>
                    <text x="130" y="60" font-family="sans-serif" font-size="14">17 cm</text>
                    <text x="0" y="75" font-family="sans-serif" font-size="14">8 cm</text>
                    <text x="110" y="138" font-family="sans-serif" font-size="14">15 cm</text>
                </svg>
            `,
            options: [
                "15 / 17",
                "8 / 17",
                "8 / 15",
                "15 / 8"

            correct: 1,
            explanation: "O Seno exige dividir o Cateto Oposto pela Hipotenusa. O cateto de frente para θ é o 8, e a hipotenusa é 17. Portanto, a fração é 8/17."
        },
        {
            id: 12, skill: "EF.09.MAT.2.96", taxonomy: "Analisar e Interpretar",
            text: "Aproveitando o mesmo triângulo da questão anterior (lados 8, 15 e 17, ângulo θ oposto ao 8), escreva em formato de fração as razões para Cosseno (cos θ) e Tangente (tan θ), respectivamente:",
            figure: null,
            options: [
                "cos = 8/17 e tan = 15/17",
                "cos = 15/17 e tan = 8/15",
                "cos = 15/17 e tan = 15/8",
                "cos = 8/15 e tan = 15/17"
            ],
            correct: 1,
            explanation: "Cosseno é Adjacente / Hipotenusa (o vizinho é 15, a hipotenusa é 17, logo 15/17). Tangente é Oposto / Adjacente (o oposto é 8, vizinho é 15, logo 8/15)."
        }
    ];

    /* =========================================================
       ESTADO DA APLICAÇÃO E VARIÁVEIS DO ALUNO
       ========================================================= */
    let currentQuestionIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let startTime = null;
    let endTime = null;
    
    // Dados do Aluno
    let studentName = "";
    let studentClass = "";

    const app = document.getElementById('app');

    function renderLandingPage() {
        app.innerHTML = `
            <div class="card fade-in" style="text-align: center; padding: 3rem 2rem;">
                <h1>Simulado Preparatório - Prova Etapa 2</h1>
                <h2>Prof. Maicon - SESI Jaú (Unidade 5)</h2>
                
                <div class="input-group">
                    <label class="input-label" for="inputName">Seu Nome Completo:</label>
                    <input type="text" id="inputName" class="input-field" placeholder="Ex: João da Silva">

                    <label class="input-label" for="selectClass">Sua Turma:</label>
                    <select id="selectClass" class="input-field">
                        <option value="">Selecione a turma...</option>
                        <option value="9º Ano A">9º Ano A</option>
                        <option value="9º Ano B">9º Ano B</option>
                        <option value="9º Ano C">9º Ano C</option>
                    </select>
                </div>

                <button class="btn btn-large" onclick="startQuiz()">INICIAR REVISÃO</button>
            </div>
        `;
    }

    function startQuiz() {
        const nameInput = document.getElementById('inputName').value.trim();
        const classSelect = document.getElementById('selectClass').value;

        if(!nameInput || !classSelect) {
            alert("Por favor, preencha seu nome e selecione a sua turma antes de iniciar o simulado.");
            return;
        }

        studentName = nameInput;
        studentClass = classSelect;
        startTime = Date.now();
        currentQuestionIndex = 0;
        userAnswers.fill(null);
        renderQuestion();
    }

    function selectOption(index) {
        userAnswers[currentQuestionIndex] = index;
        renderQuestion(); 
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        const progress = ((currentQuestionIndex) / questions.length) * 100;
        const letters = ['A', 'B', 'C', 'D'];

        let optionsHTML = '';
        q.options.forEach((opt, idx) => {
            const isSelected = userAnswers[currentQuestionIndex] === idx ? 'selected' : '';
            optionsHTML += `
                <div class="option-btn ${isSelected}" onclick="selectOption(${idx})">
                    <span class="option-letter">${letters[idx]}</span>
                    <span>${opt}</span>
                </div>
            `;
        });

        app.innerHTML = `
            <div class="card slide-in">
                <div class="progress-container">
                    <div class="progress-header">
                        <span>Questão ${currentQuestionIndex + 1} de ${questions.length}</span>
                        <span>${Math.round(progress)}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                </div>

                <div class="question-text">${q.text}</div>
                ${q.figure ? `<div class="question-figure">${q.figure}</div>` : ''}
                
                <div class="options-grid">
                    ${optionsHTML}
                </div>

                <div class="navigation-buttons">
                    <button class="btn btn-outline" onclick="prevQuestion()" ${currentQuestionIndex === 0 ? 'style="visibility:hidden;"' : ''}>Anterior</button>
                    ${currentQuestionIndex === questions.length - 1 
                        ? `<button class="btn" onclick="finishQuiz()" ${userAnswers[currentQuestionIndex] === null ? 'disabled style="opacity:0.5"' : ''}>Finalizar e Corrigir</button>`
                        : `<button class="btn" onclick="nextQuestion()" ${userAnswers[currentQuestionIndex] === null ? 'disabled style="opacity:0.5"' : ''}>Próxima</button>`
                    }
                </div>
            </div>
        `;
    }

    function nextQuestion() { if (currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; renderQuestion(); } }
    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuestion(); } }

    /* =========================================================
       CORREÇÃO E ENVIO DE DADOS PARA A PLANILHA
       ========================================================= */
    function finishQuiz() {
        endTime = Date.now();
        
        let acertos = 0;
        userAnswers.forEach((ans, idx) => { if (ans === questions[idx].correct) acertos++; });
        const perc = Math.round((acertos / questions.length) * 100);
        const timeSpent = Math.max(1, Math.round((endTime - startTime) / 60000)); 
        
        let hab1Acertos = 0; // Pitágoras (Q1 a Q6)
        let hab2Acertos = 0; // Trigonometria (Q7 a Q12)
        for(let i=0; i<6; i++) { if(userAnswers[i] === questions[i].correct) hab1Acertos++; }
        for(let i=6; i<12; i++) { if(userAnswers[i] === questions[i].correct) hab2Acertos++; }

        // Monta o pacote de dados do aluno
        const payload = {
            nome: studentName,
            turma: studentClass,
            acertos: acertos,
            total: questions.length,
            percentual: perc,
            tempo: timeSpent,
            pitagoras: hab1Acertos,
            trigono: hab2Acertos
        };

        // Renderiza a tela de carregamento (Opcional, dá uma sensação profissional)
        app.innerHTML = `
            <div class="card fade-in" style="text-align: center; padding: 4rem 2rem;">
                <h2>Gerando seu relatório e salvando resultados...</h2>
                <div style="margin-top: 2rem;">⏳ Por favor, aguarde alguns segundos.</div>
            </div>
        `;

        // Envia os dados para a planilha usando Fetch API
        if(URL_DA_PLANILHA && URL_DA_PLANILHA.includes("script.google.com")) {
            fetch(URL_DA_PLANILHA, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Usar text/plain evita bloqueios de CORS do navegador
                body: JSON.stringify(payload)
            })
            .then(response => {
                renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos, true);
            })
            .catch(error => {
                console.error("Erro ao salvar:", error);
                renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos, false);
            });
        } else {
            // Caso você esqueça de colocar a URL, ele apenas mostra o dashboard.
            renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos, false);
        }
    }

    function renderDashboard(acertos, perc, timeSpent, hab1Acertos, hab2Acertos, saveSuccess) {
        const erros = questions.length - acertos;
        
        let medal = "Precisa Revisar a Teoria"; let icon = "📚"; let color = "var(--danger)";
        if(perc >= 90) { medal = "Ouro (Pronto para a prova!)"; icon = "🏆"; color = "#ffd700"; }
        else if(perc >= 70) { medal = "Prata (Bom domínio)"; icon = "🥈"; color = "#c0c0c0"; }
        else if(perc >= 50) { medal = "Bronze (Na média)"; icon = "🥉"; color = "#cd7f32"; }

        const classificarHabilidade = (acertosHab) => {
            if(acertosHab >= 5) return `<span class="status-badge status-good">Forte</span>`;
            if(acertosHab >= 3) return `<span class="status-badge status-warn">Médio</span>`;
            return `<span class="status-badge status-bad">Fraco</span>`;
        };

        let dicasSet = new Set();
        userAnswers.forEach((ans, i) => {
            if(ans !== questions[i].correct) {
                if(i >= 0 && i <= 3) dicasSet.add("Estude a base da matéria: Lembre que Pitágoras só serve para triângulos retângulos e a hipotenusa é sempre o MAIOR lado.");
                if(i === 4 || i === 5) dicasSet.add("Problemas com Diagonais: Para calcular a linha que corta um retângulo, eleve os lados ao quadrado e some-os (Pitágoras).");
                if(i >= 6 && i <= 9) dicasSet.add("Conceitos: Seno é Oposto/Hipotenusa. Tangente é Oposto/Adjacente. Não esqueça que a hipotenusa nunca muda de lugar.");
                if(i === 10 || i === 11) dicasSet.add("Frações Trigonométricas: Antes de montar a fração final, pare um segundo para circular quem é o cateto oposto, o vizinho e a hipotenusa daquele ângulo.");
            }
        });
        let dicasHTML = '';
        if(dicasSet.size === 0) dicasHTML = "<li>Excelente trabalho! Você compreendeu muito bem os mecanismos de resolução cobrados na prova.</li>";
        else dicasSet.forEach(dica => dicasHTML += `<li>${dica}</li>`);

        let reviewHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        questions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            const statusClass = isCorrect ? 'review-correct' : 'review-incorrect';
            const statusIcon = isCorrect ? '✅ Acertou' : '❌ Errou';
            
            reviewHTML += `
                <div class="review-item ${statusClass}">
                    <div class="review-header">
                        <span>Questão ${i+1}</span>
                        <span>${statusIcon}</span>
                    </div>
                    <p style="margin-bottom: 10px; font-weight: 500;">${q.text}</p>
                    <p><strong>Sua resposta:</strong> ${letters[userAnswers[i]]} - ${q.options[userAnswers[i]]}</p>
                    ${!isCorrect ? `<p><strong>Resposta Correta:</strong> ${letters[q.correct]} - ${q.options[q.correct]}</p>` : ''}
                    <div class="explanation"><strong>Comentário de Estudo:</strong> ${q.explanation}</div>
                </div>
            `;
        });

        const deg = (acertos / questions.length) * 360;
        
        // Mensagem visual confirmando que a nota foi enviada para o professor
        const avisoSave = saveSuccess 
            ? `<div class="save-notice">✅ Seus resultados foram registrados com sucesso e enviados ao professor!</div>` 
            : ``;

        app.innerHTML = `
            <div class="fade-in">
                <header>
                    <h1>Relatório de ${studentName}</h1>
                    <h2>Turma: ${studentClass}</h2>
                </header>

                ${avisoSave}

                <div class="dashboard-grid">
                    <div class="card summary-card">
                        <h3>Desempenho Geral</h3>
                        <div class="medal-icon">${icon}</div>
                        <div style="font-size: 1.2rem; font-weight: bold; color: ${color}; margin-bottom: 10px;">${medal}</div>
                        <div class="score-huge">${acertos} <span style="font-size: 1.5rem; font-weight: normal">/ 12</span></div>
                        <div style="font-size: 1.2rem;">${perc}% de Aproveitamento</div>
                        <div style="margin-top: 10px; opacity: 0.8;">Tempo: ~${timeSpent} min</div>
                    </div>

                    <div class="card chart-container">
                        <h3>Gráfico de Acertos</h3>
                        <div class="donut-chart" style="--chart-deg: ${deg}deg;">
                            <div class="donut-inner">${perc}%</div>
                        </div>
                        <div class="chart-legend">
                            <div class="legend-item"><div class="legend-color" style="background:var(--success-dark)"></div> ${acertos} Corretas</div>
                            <div class="legend-item"><div class="legend-color" style="background:var(--danger)"></div> ${erros} Incorretas</div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <div class="card">
                        <h3>Mapeamento de Habilidades</h3>
                        <table class="data-table">
                            <tr>
                                <td><strong>Teorema de Pitágoras</strong><br><small>Habilidade EF.09.MAT.3.100</small></td>
                                <td>${classificarHabilidade(hab1Acertos)}</td>
                            </tr>
                            <tr>
                                <td><strong>Razões Trigonométricas</strong><br><small>Habilidade EF.09.MAT.2.96</small></td>
                                <td>${classificarHabilidade(hab2Acertos)}</td>
                            </tr>
                        </table>
                    </div>

                    <div class="card">
                        <h3>Onde Focar os Estudos?</h3>
                        <ul class="study-plan-list">
                            ${dicasHTML}
                        </ul>
                    </div>
                </div>

                <div class="card">
                    <h3>Revisão Detalhada das Questões</h3>
                    <div style="margin-top: 1.5rem;">
                        ${reviewHTML}
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn" onclick="window.print()">
                        Imprimir / Baixar PDF
                    </button>
                </div>
            </div>
        `;
    }

    renderLandingPage();

</script>
</body>
</html>
